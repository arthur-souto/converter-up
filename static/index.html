<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js" defer></script>
    <title>Converter</title>
  </head>
  <body>
    <main>
      <h1>Download</h1>
      <p class="subtitle">Cole o link do vídeo e converta para áudio em instantes.</p>
      <div class="main-container">
        <input class="input-url" type="text" placeholder="Cole o link do vídeo aqui" />
        <select class="select-format">
          <option value="mp3">MP3 — Áudio</option>
          <option value="m4a">M4A — Áudio</option>
          <option value="wav">WAV — Áudio</option>
          <option value="ogg">OGG — Áudio</option>
          <option value="mp4">MP4 — Vídeo</option>
          <option value="webm">WebM — Vídeo</option>
        </select>
        <button class="button-action">
          <span class="spinner"></span>
          <span class="button-text">Converter</span>
        </button>
      </div>
    </main>
  </body>
</html>
